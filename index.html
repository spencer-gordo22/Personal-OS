<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- PWA -->
  <meta name="theme-color" content="#0A0A0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Spencer OS">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/logo-mark.svg">

  <title>Spencer OS · Dashboard</title>
  <link rel="icon" href="assets/logo-mark.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="colors_and_type.css?v=42">
  <style>
    /* Hardcoded #0A0A0F on every root element — if any gap appears at the
       bottom on iPhone PWA it becomes invisible against the nav background */
    html, body, #root { height: 100%; margin: 0; background-color: #0A0A0F; }
    body { overflow: hidden; }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 2px; }
    *::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
    *::-webkit-scrollbar-track { background: transparent; }
  </style>

  <!-- Core UI libs -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

  <!-- Supabase SDK (must load before db.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
  <!-- DB bootstrap: initialises window._supa + one-time localStorage migration -->
  <script src="db.js?v=42"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ui.jsx?v=42"></script>
  <script type="text/babel" src="Sidebar.jsx?v=42"></script>
  <script type="text/babel" src="TopBar.jsx?v=42"></script>
  <script type="text/babel" src="modules/Cash.jsx?v=42"></script>
  <script type="text/babel" src="modules/Investments.jsx?v=42"></script>
  <script type="text/babel" src="modules/HealthPulse.jsx?v=42"></script>
  <script type="text/babel" src="modules/Workouts.jsx?v=42"></script>
  <script type="text/babel" src="modules/DailyChecklist.jsx?v=42"></script>
  <script type="text/babel" src="modules/CRM.jsx?v=42"></script>
  <script type="text/babel" src="modules/Calendar.jsx?v=42"></script>
  <script type="text/babel" src="modules/Journal.jsx?v=42"></script>
  <script type="text/babel" src="modules/Goals.jsx?v=42"></script>
  <script type="text/babel" src="modules/SAT.jsx?v=42"></script>
  <script type="text/babel" src="modules/CommandPalette.jsx?v=42"></script>
  <script type="text/babel" src="App.jsx?v=42"></script>

  <!-- Register service worker for PWA / offline support -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => {
          console.warn('[PWA] Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
