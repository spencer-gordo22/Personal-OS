# fly.toml app configuration file generated for spencer-os on 2026-05-22T11:28:09-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# ── Custom Domain Setup ───────────────────────────────────────────────────────
# 1. Buy your domain (e.g. spenceros.com) from any registrar (Namecheap, etc.)
# 2. Run:  flyctl certs add yourdomain.com
#          flyctl certs add www.yourdomain.com
# 3. In your registrar's DNS settings add:
#       CNAME  @    spencer-os.fly.dev.   (or use the A/AAAA IPs from `flyctl ips list`)
#       CNAME  www  spencer-os.fly.dev.
# 4. Update BASE_URL below AND run:
#       flyctl secrets set BASE_URL="https://yourdomain.com"
# 5. Wait 1-5 min for TLS cert provisioning — check with `flyctl certs show yourdomain.com`
# ─────────────────────────────────────────────────────────────────────────────

app = 'spencer-os'
primary_region = 'dfw'

[build]

[env]
  # Update BASE_URL to your custom domain after running `flyctl certs add`
  BASE_URL = 'https://spencer-os.fly.dev'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
